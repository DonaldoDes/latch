[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "ISC", "Unicode-DFS-2016"]
copyleft = "deny"
default = "deny"

[advisories]
vulnerability = "deny"
unmaintained = "warn"
