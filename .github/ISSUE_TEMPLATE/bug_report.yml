name: Bug Report
description: Report a bug in latch
labels: ["bug"]
body:
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., macOS 15.3, Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal Emulator
      placeholder: "e.g., iTerm2, Alacritty, WezTerm, Terminal.app"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: latch version
      placeholder: "Output of `latch --version`"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `latch new test bash`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
